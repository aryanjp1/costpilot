services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: costpilot
      POSTGRES_USER: costpilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-costpilot_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://costpilot:${DB_PASSWORD:-costpilot_dev}@db:5432/costpilot
      SECRET_KEY: ${SECRET_KEY:-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8787
    depends_on:
      - backend

volumes:
  pgdata:
